services:
  postgres:
    image: postgres:15-alpine
    container_name: canals_api
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: canals_orders
    ports:
      - "5432:5432"
    volumes:
      - canals_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d canals_orders"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  canals_pg_data: